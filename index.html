<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>บันทึกก้าวเดิน</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    body { font-family: 'Sarabun', sans-serif; background: linear-gradient(to bottom, #8B0000, #FF6666); margin: 0; padding: 20px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
    .form-container { background: #ffffff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); width: 100%; max-width: 350px; box-sizing: border-box; }
    input { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
    .sync-btn { width: 100%; padding: 12px; background-color: #4285F4; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; margin-bottom: 15px; }
    .reward-btn { display: none; width: 100%; padding: 15px; background: linear-gradient(to right, #cc0000, #ff4d4d); color: #ffffff; text-align: center; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; text-decoration: none; margin-top: 15px; box-sizing: border-box; }
    .footer-text { color: gray; text-align: center; font-size: 12px; margin-top: auto; padding-top: 30px; }
  </style>
</head>
<body>
  <div class="form-container">
    <h2 style="text-align: center; color: #333; margin-top: 0;">🏃‍♂️ ซิงค์ก้าวเดิน</h2>
    <div id="form-section">
      <div id="welcome-text" style="text-align: center; margin-bottom: 15px; color: #8B0000; font-weight: bold;">กำลังโหลดข้อมูล...</div>
      <div id="register-section" style="display: none;">
        <input type="text" id="firstName" placeholder="ชื่อจริง (ไม่ต้องใส่คำนำหน้า)">
        <input type="text" id="lastName" placeholder="นามสกุล">
      </div>
      <button class="sync-btn" onclick="authAndFetchSteps()" id="syncBtn" style="display: none;">ดึงข้อมูล Google Fit</button>
      <div id="status-text" style="text-align: center; font-size: 14px; color: #666; margin-top: 10px;"></div>
    </div>
    <div id="result-section" style="display: none; text-align: center;">
      <h3 id="result-title"></h3>
      <p id="step-result"></p>
      <a href="ใส่_URL_สำหรับลงทะเบียนรางวัลตรงนี้" target="_blank" class="reward-btn" id="rewardBtn">ลงทะเบียน LINE Reward รับฟรี 100 Point</a>
    </div>
  </div>
  <div class="footer-text">ระบบลงทะเบียนพนักงาน © 2026 Internal Use Only Channel Academy&Communication</div>

  <script>
    // ========= ตั้งค่า 3 ตัวแปรนี้ =========
    const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbywpUQFxq4D8hrROE4cUKUJiESWO6u9_FbNecjre7oAYL11gzHeBQMcIUsnlkoaqKbhUQ/exec';
    const GOOGLE_CLIENT_ID = '731149810126-a014l53tne9jibs12bb9btfmbl3clktc.apps.googleusercontent.com';
    const LIFF_ID = '2009549576-QRJfiper';
    // =======================================

    let lineUserId = "Unknown";
    let tokenClient;
    let isRegistered = false;

    // 🌟 ใส่ลิงก์ GitHub ของคุณตรงนี้ (อย่าลืมเครื่องหมาย / ปิดท้าย และต้องเป็น https)
    const GITHUB_URL = " https://linecommu.github.io/TQM/";

    async function initializeLiff() {
      await liff.init({ liffId: LIFF_ID });
      
      // 1. ถ้าเปิดจากในแอป LINE ให้เตะออกไปที่เบราว์เซอร์ (ใช้ลิงก์ GitHub โดยตรง เพื่อแก้ปัญหาเด้งวนลูป)
      if (liff.isInClient()) {
        liff.openWindow({
          url: GITHUB_URL, 
          external: true
        });
        return; 
      }

      // 2. ถ้าอยู่บนเบราว์เซอร์ (Safari/Chrome) แล้ว ให้ทำงานตามปกติ
      if (liff.isLoggedIn()) {
        const profile = await liff.getProfile();
        lineUserId = profile.userId;
        checkUserInDatabase(lineUserId);
      } else { 
        // 3. ถ้ายังไม่ล็อกอิน ให้ล็อกอิน และบังคับให้กลับมาที่หน้า GitHub เดิม (ไม่ให้เด้งกลับเข้าแอป LINE)
        liff.login({ redirectUri: GITHUB_URL }); 
      }
    }

    // ยิง API ไปเช็คชื่อพนักงาน
    async function checkUserInDatabase(uid) {
      try {
        const response = await fetch(GAS_WEB_APP_URL, {
          method: 'POST',
          redirect: 'follow', // เพิ่มบรรทัดนี้
          headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // เพิ่มบรรทัดนี้
          body: JSON.stringify({ action: 'checkUser', uid: uid })
        });
        const user = await response.json();
        
        if (user) {
          isRegistered = true;
          document.getElementById('welcome-text').innerText = "สวัสดีคุณ " + user.firstName;
        } else {
          isRegistered = false;
          document.getElementById('welcome-text').innerText = "ลงทะเบียนใช้งานครั้งแรก";
          document.getElementById('register-section').style.display = "block";
        }
        document.getElementById('syncBtn').style.display = "block";
      } catch (error) {
        document.getElementById('welcome-text').innerText = "เชื่อมต่อฐานข้อมูลล้มเหลว";
      }
    }

    window.onload = function () {
      initializeLiff();
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: GOOGLE_CLIENT_ID,
        scope: 'https://www.googleapis.com/auth/fitness.activity.read',
        callback: (tokenResponse) => {
          if (tokenResponse && tokenResponse.access_token) fetchStepsData(tokenResponse.access_token);
        },
      });
    };

    function authAndFetchSteps() {
      if (!isRegistered) {
        const fName = document.getElementById('firstName').value;
        const lName = document.getElementById('lastName').value;
        if (!fName || !lName) { alert("กรุณากรอกชื่อและนามสกุลให้ครบถ้วน"); return; }
      }
      document.getElementById('status-text').innerText = "กำลังเชื่อมต่อ Google Fit...";
      tokenClient.requestAccessToken();
    }

    async function fetchStepsData(accessToken) {
      document.getElementById('status-text').innerText = "กำลังคำนวณจำนวนก้าว...";
      const now = new Date();
      const startOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
      const requestBody = {
        aggregateBy: [{ dataTypeName: "com.google.step_count.delta", dataSourceId: "derived:com.google.step_count.delta:com.google.android.gms:estimated_steps" }],
        bucketByTime: { durationMillis: 86400000 }, startTimeMillis: startOfDay, endTimeMillis: now.getTime()
      };
      
      try {
        const response = await fetch('https://www.googleapis.com/fitness/v1/users/me/dataset:aggregate', {
          method: 'POST', headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json' }, body: JSON.stringify(requestBody)
        });
        const data = await response.json();
        let totalSteps = 0;
        if (data.bucket && data.bucket.length > 0 && data.bucket[0].dataset[0].point.length > 0) {
          totalSteps = data.bucket[0].dataset[0].point[0].value[0].intVal;
        }
        checkConditionAndSave(totalSteps);
      } catch (error) { document.getElementById('status-text').innerText = "เกิดข้อผิดพลาดในการดึงข้อมูล"; }
    }

    // ยิง API ไปบันทึกก้าวเดิน
    async function checkConditionAndSave(steps) {
      const formSec = document.getElementById("form-section");
      const resultSec = document.getElementById("result-section");
      const resultTitle = document.getElementById("result-title");
      const stepResult = document.getElementById("step-result");
      const rewardBtn = document.getElementById("rewardBtn");

      let inputFirstName = "", inputLastName = "";
      if (!isRegistered) {
        inputFirstName = document.getElementById('firstName').value;
        inputLastName = document.getElementById('lastName').value;
      }

      formSec.style.display = "none";
      resultSec.style.display = "block";

      if (steps < 7000) {
        resultTitle.innerText = "🏃‍♂️ พยายามอีกนิดนะ!";
        resultTitle.style.color = "#ff9800";
        stepResult.innerHTML = `วันนี้คุณเดินได้ <b>${steps.toLocaleString()} ก้าว</b><br><br><span style='color:red; font-size:14px;'>เงื่อนไข: ต้องเดิน 100 ก้าวขึ้นไป ระบบจึงจะบันทึกให้ครับ</span>`;
        rewardBtn.style.display = "none";
      } else {
        resultTitle.innerText = "⏳ กำลังบันทึกข้อมูล...";
        resultTitle.style.color = "#666";
        
        try {
          const response = await fetch(GAS_WEB_APP_URL, {
            method: 'POST',
            redirect: 'follow', // เพิ่มบรรทัดนี้
            headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // เพิ่มบรรทัดนี้
            body: JSON.stringify({ action: 'recordSteps', uid: lineUserId, firstName: inputFirstName, lastName: inputLastName, steps: steps })
          });
          const res = await response.json();
          
          if(res.status === "success") {
            resultTitle.innerText = "✅ บันทึกสำเร็จ!";
            resultTitle.style.color = "#28a745";
            stepResult.innerHTML = `ยอดวันนี้: <b>${steps.toLocaleString()} ก้าว</b>`;
            rewardBtn.style.display = "block";
          }
        } catch(e) {
            resultTitle.innerText = "❌ บันทึกล้มเหลว";
        }
      }
    }
  </script>
</body>
</html>
