<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>ระบบลงทะเบียนพนักงาน Channel Academy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600&family=Sarabun:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    :root {
      --primary: #1976D2;      /* สีฟ้าคราม公司โทน */
      --primary-dark: #1565C0;
      --bg-color: #E3F2FD;
      --card-bg: #FFFFFF;
      --text-main: #333;
      --text-sub: #666;
    }
    body { font-family: 'Sarabun', sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-main); }
    .card { background: var(--card-bg); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; box-sizing: border-box; transition: transform 0.3s ease; }
    h2, h3 { font-family: 'Kanit', sans-serif; text-align: center; color: var(--primary); margin: 0 0 5px 0; }
    .sub-title { font-size: 13px; color: var(--text-sub); text-align: center; margin-bottom: 25px; }
    input { width: 100%; padding: 12px 15px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; transition: border 0.3s ease; }
    input:focus { border: 2px solid var(--primary); outline: none; }
    .sync-btn, .chrome-btn { width: 100%; padding: 14px; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; font-family: 'Kanit', sans-serif; cursor: pointer; transition: all 0.2s ease; box-shadow: 0 4px 10px rgba(0,185,0,0.2); }
    .sync-btn { background-color: var(--primary); }
    .sync-btn:hover { background-color: var(--primary-dark); }
    .chrome-btn { background-color: #4285F4; box-shadow: 0 4px 10px rgba(66,133,244,0.3); }
    #status-text { text-align: center; font-size: 14px; color: var(--text-sub); margin-top: 15px; }
    #result-title { font-family: 'Kanit', sans-serif; font-weight: 600; }
    #rewardBtn { display: none; margin-top: 20px; text-decoration: none; text-align: center; }
    .footer { text-align: center; font-size: 12px; color: var(--text-sub); margin-top: 30px; }
    
    /* 🌟 เพิ่มส่วนตกแต่งโลโก้ 🌟 */
    .logo-header { text-align: center; margin-bottom: 20px; }
    .logo-header img { max-width: 150px; height: auto; }
    
    @media (min-width: 768px) { body { padding: 50px; } .card { padding: 40px; } }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-header">
      <img src="https://img2.pic.in.th/Google-Fit.png" alt="Channel Academy Logo">
    </div>
    
    <h2>ลงทะเบียนและเชื่อมต่อข้อมูล</h2>
    <div class="sub-title">User Registration & Google Fit Sync</div>
    
    <div id="form-section">
      <div id="welcome-text" style="text-align: center; margin-bottom: 20px; font-weight: 600;">กำลังตรวจสอบสถานะ...</div>
      
      <div id="register-section" style="display: none;">
        <input type="text" id="firstName" placeholder="ชื่อจริง (ไม่ต้องใส่คำนำหน้า) / First Name">
        <input type="text" id="lastName" placeholder="นามสกุล / Last Name">
      </div>
      
      <button class="sync-btn" onclick="authAndFetchSteps()" id="syncBtn" style="display: none;">เชื่อมต่อ Google Fit เพื่อเริ่มสะสมก้าว</button>
      <div id="status-text"></div>
    </div>

    <div id="result-section" style="display: none; text-align: center;">
      <h3 id="result-title"></h3>
      <p id="step-result" style="font-size: 15px; margin: 15px 0;"></p>
      <a href="https://linecommu.github.io/Leaderboard/leaderboard.html" target="_blank" class="sync-btn" id="rewardBtn">ดูอันดับความฟิต</a>
    </div>
  </div>
  
  <div class="footer">
    ระบบลงทะเบียนพนักงาน © 2026<br>
    Channel Academy&Communication
  </div>

 <script>
    // ========= 1. ตั้งค่าตัวแปรให้ครบ =========
    const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbywpUQFxq4D8hrROE4cUKUJiESWO6u9_FbNecjre7oAYL11gzHeBQMcIUsnlkoaqKbhUQ/exec';
    const GOOGLE_CLIENT_ID = '731149810126-a014l53tne9jibs12bb9btfmbl3clktc.apps.googleusercontent.com';
    const LIFF_ID = '2009549576-QRJfiper';
    
    // 🌟 ใส่แค่ Domain และ Path ห้ามใส่ https:// เด็ดขาด! 🌟
    const GITHUB_DOMAIN_PATH = "linecommu.github.io/TQM/index.html"; 
    // ========================================================

    const FULL_URL = "https://" + GITHUB_DOMAIN_PATH;
    let lineUserId = "Unknown";
    let codeClient;
    let isRegistered = false;

     // ฟังก์ชันหลัก
    async function main() {
      try {
        await liff.init({ liffId: LIFF_ID });

        // ถ้าเปิดอยู่ในแอป LINE ให้บังคับยิงไป Google Chrome ทันที!
        if (liff.isInClient()) {
          document.getElementById('welcome-text').innerText = "กำลังสลับไปเปิดแอป Google Chrome...";
          document.getElementById('welcome-text').style.color = "#00B900";
          forceOpenChrome();
        } else {
          // ถ้าเปิดใน Chrome สำเร็จแล้ว ให้ทำงานตามปกติ
          if (!liff.isLoggedIn()) {
            liff.login();
          } else {
            const profile = await liff.getProfile();
            lineUserId = profile.userId;
            checkUserInDatabase(lineUserId);
            
            // 🌟 แก้ไขตรงนี้: เปลี่ยนเป็นชื่อฟังก์ชันที่ถูกต้อง 🌟
            initGoogleAuthCodeClient(); 
          }
        }
      } catch (err) {
        document.getElementById('welcome-text').innerText = "เกิดข้อผิดพลาด: " + err.message;
        document.getElementById('welcome-text').style.color = "red";
      }
    }
    window.onload = main;

    // 🌟 ท่าไม้ตาย: ฟังก์ชันบังคับเปิดแอป Google Chrome (Deep Link) 🌟
    function forceOpenChrome() {
      const userAgent = navigator.userAgent || navigator.vendor || window.opera;

      if (/android/i.test(userAgent)) {
        // สำหรับ Android: บังคับยิงเข้า Package ของ Google Chrome โดยตรง
        window.location.href = "intent://" + GITHUB_DOMAIN_PATH + "#Intent;scheme=https;package=com.android.chrome;end;";
      } else if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
        // สำหรับ iOS: ใช้คำสั่ง googlechromes:// เพื่อเรียกแอป Chrome
        window.location.href = "googlechromes://" + GITHUB_DOMAIN_PATH;
        
        // สำรองสำหรับ iOS: ถ้าพนักงานคนไหนไม่ได้ลงแอป Chrome ไว้ในเครื่อง 
        // ภายใน 2 วินาทีระบบจะพาไปเปิดใน Safari แทน เพื่อไม่ให้หน้าจอค้าง
        setTimeout(function() {
          window.location.href = FULL_URL;
        }, 2000);
      } else {
        // สำหรับทดสอบบน PC
        window.location.href = FULL_URL;
      }
    }


    // ----------------------------------------------------------------------
    // ส่วนล่างนี้คือฟังก์ชันเดิมทั้งหมด
    // ----------------------------------------------------------------------

    function initGoogleAuthCodeClient() {
      codeClient = google.accounts.oauth2.initCodeClient({
        client_id: GOOGLE_CLIENT_ID, 
        scope: 'https://www.googleapis.com/auth/fitness.activity.read',
        ux_mode: 'popup', 
        callback: (response) => { 
          if (response.code) { sendCodeAndRegisterToGAS(response.code); } 
        },
      });
    }

    async function checkUserInDatabase(uid) {
      try {
        const response = await fetch(GAS_WEB_APP_URL, {
          method: 'POST', redirect: 'follow', headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action: 'checkUser', uid: uid })
        });
        const user = await response.json();
        
        if (user) {
          isRegistered = true;
          // 🌟 แก้ไขตรงนี้: เพิ่มการแสดงนามสกุล 🌟
          document.getElementById('welcome-text').innerHTML = `ยินดีต้อนรับ คุณ <span style="color:var(--primary); font-size:18px;">${user.firstName} ${user.lastName}</span>`;
          if(user.hasToken) {
            document.getElementById('welcome-text').innerHTML += "<br><span style='color:#28a745; font-size: 14px; font-weight: 400;'>✅ ระบบจะดึงยอดก้าวเดินของคุณให้ทุกวันอัตโนมัติครับ</span>";
            document.getElementById('syncBtn').style.display = "none";
          } else {
            document.getElementById('syncBtn').style.display = "block";
          }
        } else {
          isRegistered = false;
          document.getElementById('welcome-text').innerText = "ลงทะเบียนใช้งานครั้งแรก";
          document.getElementById('welcome-text').style.color = "#FF6D00";
          document.getElementById('register-section').style.display = "block";
          document.getElementById('syncBtn').style.display = "block";
        }
      } catch (error) { document.getElementById('status-text').innerText = "เชื่อมต่อฐานข้อมูลล้มเหลว"; }
    }

    function authAndFetchSteps() {
      if (!isRegistered) {
        if (!document.getElementById('firstName').value || !document.getElementById('lastName').value) { 
          alert("กรุณากรอกชื่อและนามสกุลให้ครบถ้วน"); return; 
        }
      }
      document.getElementById('status-text').innerText = "⏳ กำลังเชื่อมต่อกับ Google Fit...";
      codeClient.requestCode();
    }

    async function sendCodeAndRegisterToGAS(authCode) {
      document.getElementById("form-section").style.display = "none";
      document.getElementById("result-section").style.display = "block";
      document.getElementById("result-title").innerText = "⏳ กำลังตั้งค่าระบบ...";
        
      try {
        const response = await fetch(GAS_WEB_APP_URL, {
          method: 'POST', redirect: 'follow', headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action: 'registerAndSync', uid: lineUserId, firstName: document.getElementById('firstName').value, lastName: document.getElementById('lastName').value, authCode: authCode })
        });
        const res = await response.json();
          
        if (res.status === "success") {
          document.getElementById("result-title").innerText = "✅ บันทึกและซิงค์สำเร็จ!";
          document.getElementById("result-title").style.color = "#28a745";
          document.getElementById("step-result").innerHTML = `ยอดปัจจุบันของคุณ: <b>${res.steps.toLocaleString()} ก้าว</b><br><br><span style='color:var(--primary); font-weight:600;'>เยี่ยมเลย! ยอดคุณถึง 7,000 ก้าว!</span><br><span style='color:#666; font-size:14px;'>นับจากนี้ระบบจะดึงยอดอัตโนมัติทุกวันตอน 23:59 น. ครับ</span>`;
          document.getElementById('rewardBtn').style.display = "inline-block";
        } 
        else if (res.status === "not_enough_steps") {
          document.getElementById("result-title").innerText = "🏃‍♂️ เดินต่ออีกนิดนะ!";
          document.getElementById("result-title").style.color = "#FF9800";
          document.getElementById("step-result").innerHTML = `ยอดปัจจุบันของคุณ: <b>${res.steps.toLocaleString()} ก้าว</b><br><br><span style='color:red; font-size:14px;'>ยังไม่ถึงเกณฑ์ 7,000 ก้าว ระบบจึงยังไม่บันทึกคะแนนให้ครับ</span><br><br><span style='color:var(--primary); font-weight:600;'>✅ แต่ระบบลงทะเบียนสำเร็จแล้ว!</span><br><span style='color:#666; font-size:14px;'>เดินให้ครบนะ! หุ่นยนต์จะมาดึงยอดให้อัตโนมัติเวลา 23:59 น. ของทุกวันครับ</span>`;
          document.getElementById('rewardBtn').style.display = "none";
        }
      } catch(e) {
          document.getElementById("result-title").innerText = "❌ เกิดข้อผิดพลาดในการเชื่อมต่อ";
      }
    }
  </script>
</body>
</html>
